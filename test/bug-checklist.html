<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bug Verification Checklist - Module 2A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .team-selector {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .team-selector label {
            font-weight: bold;
            margin-right: 10px;
            color: #333;
        }
        .team-selector select {
            padding: 10px 15px;
            font-size: 1em;
            border: 2px solid #667eea;
            border-radius: 6px;
            cursor: pointer;
        }
        .bug-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
            background: #fff;
            transition: all 0.3s;
        }
        .bug-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        .bug-card.completed {
            background: #f0f9ff;
            border-color: #10b981;
        }
        .bug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .bug-title {
            font-size: 1.3em;
            color: #333;
            font-weight: bold;
        }
        .bug-priority {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .priority-high { background: #fee2e2; color: #dc2626; }
        .priority-medium { background: #fef3c7; color: #d97706; }
        .priority-low { background: #dbeafe; color: #2563eb; }
        .bug-component {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .checklist-section {
            margin-top: 20px;
        }
        .checklist-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            margin-bottom: 8px;
            background: #f9fafb;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .checklist-item:hover {
            background: #f3f4f6;
        }
        .checklist-item input[type="checkbox"] {
            margin-right: 12px;
            margin-top: 4px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .checklist-item label {
            cursor: pointer;
            flex: 1;
            line-height: 1.6;
        }
        .notes-section {
            margin-top: 20px;
        }
        .notes-section textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95em;
            resize: vertical;
        }
        .notes-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .progress-bar {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }
        .progress-bar h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .progress-fill {
            background: #e5e7eb;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill div {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .action-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        .btn-secondary:hover {
            background: #4b5563;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 Bug Verification Checklist</h1>
        <p class="subtitle">Module 2A: Exploratory Testing - Reproduce and verify assigned bugs</p>

        <div class="team-selector">
            <label for="teamSelect">Select Your Team:</label>
            <select id="teamSelect">
                <option value="">-- Choose Team --</option>
                <option value="team1">Team 1</option>
                <option value="team2">Team 2</option>
                <option value="team3">Team 3</option>
                <option value="team4">Team 4</option>
            </select>
        </div>

        <div id="bugsContainer"></div>

        <div class="progress-bar">
            <h3>Overall Progress</h3>
            <div class="progress-fill">
                <div id="progressBar" style="width: 0%">0%</div>
            </div>
            <p id="progressText">0 of 0 items completed</p>
        </div>

        <div class="action-buttons">
            <button class="btn-primary" onclick="saveProgress()">💾 Save Progress</button>
            <button class="btn-secondary" onclick="exportResults()">📄 Export Results</button>
            <button class="btn-secondary" onclick="resetAll()">🔄 Reset All</button>
        </div>
    </div>

    <script>
        const bugData = {
            team1: [
                {
                    id: 'bug-01',
                    title: 'Bug #1: Score Calculation Returns Incorrect Decimal Values',
                    priority: 'high',
                    component: 'Inspection Scoring',
                    steps: [
                        'Login as an inspector',
                        'Navigate to assigned inspections',
                        'Open any inspection',
                        'Score items: [8, 9, 8]',
                        'Click "Complete Inspection"',
                        'Observe overall score display'
                    ],
                    expected: 'Score shows 8.33 (2 decimal places)',
                    actual: 'Score shows 8.333333333 (many decimals)'
                },
                {
                    id: 'bug-02',
                    title: 'Bug #2: Past Dates Allowed for Inspection Scheduling',
                    priority: 'medium',
                    component: 'Manager Dashboard - Assignment',
                    steps: [
                        'Login as a manager',
                        'Navigate to "Pending Requests"',
                        'Click "Assign Inspector" button',
                        'Select any inspector',
                        'Set "Scheduled Date" to yesterday',
                        'Click "Assign" button',
                        'Check if assignment was created'
                    ],
                    expected: 'Error: "Scheduled date cannot be in the past"',
                    actual: 'Assignment succeeds with past date'
                }
            ],
            team2: [
                {
                    id: 'bug-03',
                    title: 'Bug #3: Missing Server-Side Validation for Score Values',
                    priority: 'high',
                    component: 'API - Inspection Scores',
                    steps: [
                        'Login as an inspector',
                        'Navigate to assigned inspection',
                        'Observe GUI only allows scores 1-10',
                        'Note: Backend API lacks validation',
                        'Use Claude Code to analyze what validation should exist',
                        'Document what invalid inputs API should reject'
                    ],
                    expected: 'API validates scores are 1-10 and rejects invalid values',
                    actual: 'API accepts any value (security issue)'
                },
                {
                    id: 'bug-04',
                    title: 'Bug #4: Offline Sync Overwrites Newer Server Data',
                    priority: 'high',
                    component: 'Mobile Inspection Form - Offline Sync',
                    steps: [
                        'Inspector A opens inspection (loads to cache)',
                        'Inspector A goes offline (airplane mode)',
                        'Inspector A adds scores offline',
                        'Manager (online) updates same inspection',
                        'Inspector A comes online and syncs',
                        'Check if Manager\'s updates were preserved'
                    ],
                    expected: 'Conflict detected with warning/merge options',
                    actual: 'Offline data silently overwrites server data'
                }
            ],
            team3: [
                {
                    id: 'bug-05',
                    title: 'Bug #5: Manager Can Submit Scores for Unassigned Inspections',
                    priority: 'medium',
                    component: 'API - Authorization',
                    steps: [
                        'Login as Manager A',
                        'Observe which inspections Manager A can see',
                        'Login as Manager B (different team)',
                        'Manager B assigns inspection to their inspector',
                        'Note: Should Manager A be able to submit scores for Manager B\'s inspection?',
                        'Use Claude Code to analyze authorization rules that should exist'
                    ],
                    expected: 'Manager can only submit scores for their team\'s inspections',
                    actual: 'Any manager can submit scores for any inspection'
                },
                {
                    id: 'bug-06',
                    title: 'Bug #6: Checklist Items Not Loading from Cache When Offline',
                    priority: 'medium',
                    component: 'Mobile Inspection Form - Offline Mode',
                    steps: [
                        'Login as inspector (online)',
                        'Navigate to assigned inspection',
                        'Wait for checklist items to load',
                        'Return to dashboard',
                        'Enable airplane mode (go offline)',
                        'Navigate back to same inspection',
                        'Observe checklist section'
                    ],
                    expected: 'Checklist items load from cache',
                    actual: 'Shows "No checklist items available"'
                }
            ],
            team4: [
                {
                    id: 'bug-07',
                    title: 'Bug #7: Progress Bar Shows Incorrect Count When Items Have Notes Only',
                    priority: 'low',
                    component: 'Mobile Inspection Form - UI',
                    steps: [
                        'Login as inspector',
                        'Open assigned inspection',
                        'Select first checklist item',
                        'Do NOT select a score (don\'t click 1-10)',
                        'Add notes: "Equipment needs cleaning"',
                        'Observe progress bar count',
                        'Repeat for 2-3 more items'
                    ],
                    expected: 'Progress counts only items with scores',
                    actual: 'Progress counts items with notes (no scores)'
                },
                {
                    id: 'bug-08',
                    title: 'Bug #8: Restaurant Owner Can Request Inspection for Other Restaurants',
                    priority: 'high',
                    component: 'API - Inspection Requests',
                    steps: [
                        'Login as Restaurant Owner A',
                        'Observe which restaurant is shown',
                        'Navigate to "Request Inspection"',
                        'GUI correctly shows only owner\'s restaurant',
                        'Note: Backend API has authorization flaw',
                        'Use Claude Code to analyze what authorization checks should exist'
                    ],
                    expected: 'Owner can only request for their own restaurant',
                    actual: 'API authorization check has implementation flaw'
                }
            ]
        };

        let currentTeam = '';
        let checklistState = {};

        document.getElementById('teamSelect').addEventListener('change', function(e) {
            currentTeam = e.target.value;
            if (currentTeam) {
                loadBugs();
                loadProgress();
            }
        });

        function loadBugs() {
            const bugs = bugData[currentTeam] || [];
            const container = document.getElementById('bugsContainer');
            container.innerHTML = '';

            bugs.forEach(bug => {
                const card = createBugCard(bug);
                container.appendChild(card);
            });

            updateProgress();
        }

        function createBugCard(bug) {
            const card = document.createElement('div');
            card.className = 'bug-card';
            card.id = bug.id;

            card.innerHTML = `
                <div class="bug-header">
                    <div class="bug-title">${bug.title}</div>
                    <span class="bug-priority priority-${bug.priority}">${bug.priority.toUpperCase()}</span>
                </div>
                <div class="bug-component">📍 ${bug.component}</div>

                <div class="checklist-section">
                    <h4>✅ Reproduction Steps:</h4>
                    ${bug.steps.map((step, i) => `
                        <div class="checklist-item">
                            <input type="checkbox" id="${bug.id}-step-${i}" onchange="updateProgress()">
                            <label for="${bug.id}-step-${i}">${step}</label>
                        </div>
                    `).join('')}
                </div>

                <div class="checklist-section">
                    <h4>Expected vs Actual:</h4>
                    <div class="checklist-item">
                        <input type="checkbox" id="${bug.id}-expected" onchange="updateProgress()">
                        <label for="${bug.id}-expected"><strong>Expected:</strong> ${bug.expected}</label>
                    </div>
                    <div class="checklist-item">
                        <input type="checkbox" id="${bug.id}-actual" onchange="updateProgress()">
                        <label for="${bug.id}-actual"><strong>Actual:</strong> ${bug.actual}</label>
                    </div>
                    <div class="checklist-item">
                        <input type="checkbox" id="${bug.id}-verified" onchange="updateProgress()">
                        <label for="${bug.id}-verified"><strong>✓ Bug Reproduced Successfully</strong></label>
                    </div>
                </div>

                <div class="notes-section">
                    <h4>📝 Your Notes & Observations:</h4>
                    <textarea id="${bug.id}-notes" placeholder="Document what you observed, any variations, additional findings..."></textarea>
                </div>
            `;

            return card;
        }

        function updateProgress() {
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
            const total = checkboxes.length;
            const percentage = total > 0 ? Math.round((checked / total) * 100) : 0;

            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressBar').textContent = percentage + '%';
            document.getElementById('progressText').textContent = `${checked} of ${total} items completed`;

            // Update card styling
            document.querySelectorAll('.bug-card').forEach(card => {
                const cardCheckboxes = card.querySelectorAll('input[type="checkbox"]');
                const cardChecked = card.querySelectorAll('input[type="checkbox"]:checked').length;
                if (cardChecked === cardCheckboxes.length && cardCheckboxes.length > 0) {
                    card.classList.add('completed');
                } else {
                    card.classList.remove('completed');
                }
            });

            saveProgress();
        }

        function saveProgress() {
            if (!currentTeam) return;

            const state = {};
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                state[cb.id] = cb.checked;
            });

            document.querySelectorAll('textarea').forEach(ta => {
                state[ta.id] = ta.value;
            });

            localStorage.setItem(`bugChecklist_${currentTeam}`, JSON.stringify(state));
            alert('✅ Progress saved!');
        }

        function loadProgress() {
            const saved = localStorage.getItem(`bugChecklist_${currentTeam}`);
            if (saved) {
                const state = JSON.parse(saved);
                Object.keys(state).forEach(id => {
                    const element = document.getElementById(id);
                    if (element) {
                        if (element.type === 'checkbox') {
                            element.checked = state[id];
                        } else if (element.tagName === 'TEXTAREA') {
                            element.value = state[id];
                        }
                    }
                });
                updateProgress();
            }
        }

        function exportResults() {
            if (!currentTeam) return;

            const bugs = bugData[currentTeam] || [];
            let report = `Bug Verification Report - ${currentTeam.toUpperCase()}\n`;
            report += `Generated: ${new Date().toLocaleString()}\n`;
            report += `\n${'='.repeat(60)}\n\n`;

            bugs.forEach(bug => {
                report += `${bug.title}\n`;
                report += `Priority: ${bug.priority}\n`;
                report += `Component: ${bug.component}\n\n`;

                const verified = document.getElementById(`${bug.id}-verified`)?.checked;
                report += `Status: ${verified ? '✅ REPRODUCED' : '❌ NOT VERIFIED'}\n\n`;

                const notes = document.getElementById(`${bug.id}-notes`)?.value;
                if (notes) {
                    report += `Notes:\n${notes}\n`;
                }

                report += `\n${'-'.repeat(60)}\n\n`;
            });

            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `bug-verification-${currentTeam}-${Date.now()}.txt`;
            a.click();
        }

        function resetAll() {
            if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
                localStorage.removeItem(`bugChecklist_${currentTeam}`);
                loadBugs();
            }
        }
    </script>
</body>
</html>
